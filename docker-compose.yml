services:
  authplex:
    image: authplex:latest
    build:
      context: ../authPlex
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTHPLEX_ENV: local
      AUTHPLEX_HTTP_PORT: 8080
      AUTHPLEX_CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      AUTHPLEX_ADMIN_API_KEY: ""  # empty = dev mode (no auth required)
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  admin-ui:
    build: .
    ports:
      - "5173:80"
    depends_on:
      authplex:
        condition: service_healthy
